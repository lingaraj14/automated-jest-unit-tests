name: App Quaqlity Check

on: [pull_request]

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint

      - name: Run Unit Tests
        run: npm test